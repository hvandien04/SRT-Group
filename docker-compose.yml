services:
  postgres:
    image: postgres:16-alpine
    container_name: ctb-postgres-local
    environment:
      POSTGRES_DB: srtgroup
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d srtgroup"]
      interval: 5s
      timeout: 5s
      retries: 10
  backend:
    build:
      context: ./todolist
      dockerfile: Dockerfile
    container_name: backend-app
    env_file:
      - ./todolist/.env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    container_name: frontend-app
    ports:
      - "3000:80"
    depends_on:
      - backend
  redis:
    image: redis:7-alpine
    container_name: ctb-redis-local
    command: [ "redis-server", "--save", "", "--appendonly", "no" ]
    ports:
      - "6379:6379"
    tmpfs:
      - /data:rw,noexec,nosuid,size=128m
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
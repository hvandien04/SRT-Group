spring:
  application:
    name: todolist
  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
  data:
    redis:
      host: ${REDIS_ADDR:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      username: ${REDIS_USER:}
server:
  port: 8080
  shutdown: graceful

springdoc:
  swagger-ui:
    disable-swagger-default-url: true
    url: ../v3/api-docs
    config-url: ../v3/api-docs/swagger-config